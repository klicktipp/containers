name: Build Docker Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "images/**"
      - "README.md"
  workflow_dispatch:

jobs:
  detect-images:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed images
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
            else
              mapfile -t image_dirs < <(
                git diff --name-only "${before}" "${after}" \
                  | awk -F/ '/^images\/[^/]+\// { print $2 }' \
                  | sort -u
              )
            fi
          fi

          if (( ${#image_dirs[@]} == 0 )); then
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          matrix_json="$(
            printf '%s\n' "${image_dirs[@]}" \
              | jq -R '{name: ., context: ("./images/" + .)}' \
              | jq -s '{include: .}'
          )"

          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  build:
    runs-on: ubuntu-latest
    needs: detect-images
    if: ${{ fromJson(needs.detect-images.outputs.matrix).include[0] != null }}
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
