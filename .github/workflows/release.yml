name: Release Docker Images

on:
  workflow_run:
    workflows:
      - Push Docker Images
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == github.event.repository.default_branch }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate release data
        id: release_data
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          short_sha="${head_sha:0:12}"
          current_tag="main-${short_sha}"
          previous_tag="$(
            git tag --list 'main-*' --sort=-creatordate \
              | head -n1 || true
          )"
          body_file="$(mktemp)"

          {
            echo "Automated release for commit \`${short_sha}\`."
            echo
            echo "<!-- image-release-notes:start -->"
            echo "## Image Changes"
            echo

            found_changes=false

            for image_dir in images/*; do
              [[ -d "${image_dir}" ]] || continue

              image_name="$(basename "${image_dir}")"

              if [[ -n "${previous_tag}" ]]; then
                commits="$(
                  git log --reverse --format='- %s (%h)' "${previous_tag}..${head_sha}" -- "${image_dir}" || true
                )"
              else
                commits="$(
                  git log --reverse --format='- %s (%h)' "${head_sha}" -- "${image_dir}" || true
                )"
              fi

              if [[ -z "${commits}" ]]; then
                continue
              fi

              found_changes=true
              echo "### ${image_name}"
              echo
              printf '%s\n' "${commits}"
              echo
            done

            if [[ "${found_changes}" == false ]]; then
              echo "No image-specific changes found for this release."
              echo
            fi

            echo "<!-- image-release-notes:end -->"
          } > "${body_file}"

          echo "tag=${current_tag}" >> "${GITHUB_OUTPUT}"
          echo "name=main ${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "target=${head_sha}" >> "${GITHUB_OUTPUT}"
          echo "body_path=${body_file}" >> "${GITHUB_OUTPUT}"

      - name: Update GitHub release body
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = '${{ steps.release_data.outputs.tag }}';
            const name = '${{ steps.release_data.outputs.name }}';
            const target = '${{ steps.release_data.outputs.target }}';
            const body = fs.readFileSync('${{ steps.release_data.outputs.body_path }}', 'utf8');

            let existing = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              existing = response.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: false,
              });
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: target,
                name,
                body,
                draft: false,
                prerelease: false,
              });
            }
