name: Build Docker Images

on:
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "images/**"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "images/**"
      - "README.md"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  detect-images:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed images
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "release" ]]; then
            mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t image_dirs < <(
              git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
                | awk -F/ '/^images\/[^/]+\// { print $2 }' \
                | sort -u
            )
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
            else
              mapfile -t image_dirs < <(
                git diff --name-only "${before}" "${after}" \
                  | awk -F/ '/^images\/[^/]+\// { print $2 }' \
                  | sort -u
              )
            fi
          fi

          if (( ${#image_dirs[@]} == 0 )); then
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          matrix_json="$(
            printf '%s\n' "${image_dirs[@]}" \
              | jq -R '{name: ., context: ("./images/" + .)}' \
              | jq -cs '{include: .}'
          )"

          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  release-notes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate image-specific release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${{ github.event.release.tag_name }}"
          previous_tag="$(
            git tag --sort=-creatordate \
              | grep -Fxv "${current_tag}" \
              | head -n1 || true
          )"
          notes_file="$(mktemp)"

          {
            echo "<!-- image-release-notes:start -->"
            echo "## Image Changes"
            echo

            found_changes=false

            for image_dir in images/*; do
              [[ -d "${image_dir}" ]] || continue

              image_name="$(basename "${image_dir}")"

              if [[ -n "${previous_tag}" ]]; then
                commits="$(
                  git log --reverse --format='- %s (%h)' "${previous_tag}..${current_tag}" -- "${image_dir}" || true
                )"
              else
                commits="$(
                  git log --reverse --format='- %s (%h)' "${current_tag}" -- "${image_dir}" || true
                )"
              fi

              if [[ -z "${commits}" ]]; then
                continue
              fi

              found_changes=true
              echo "### ${image_name}"
              echo
              printf '%s\n' "${commits}"
              echo
            done

            if [[ "${found_changes}" == false ]]; then
              echo "No image-specific changes found for this release."
              echo
            fi

            echo "<!-- image-release-notes:end -->"
          } > "${notes_file}"

          {
            echo "body_path=${notes_file}"
          } >> "${GITHUB_OUTPUT}"

      - name: Update GitHub release body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const markerStart = '<!-- image-release-notes:start -->';
            const markerEnd = '<!-- image-release-notes:end -->';
            const generatedBlock = fs.readFileSync('${{ steps.notes.outputs.body_path }}', 'utf8').trim();
            const release = context.payload.release;
            const currentBody = release.body || '';

            const blockRegex = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`, 'm');
            const nextBody = blockRegex.test(currentBody)
              ? currentBody.replace(blockRegex, generatedBlock)
              : (currentBody ? `${currentBody}\n\n${generatedBlock}` : generatedBlock);

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: nextBody,
            });

  build:
    runs-on: ubuntu-latest
    needs: detect-images
    if: ${{ fromJson(needs.detect-images.outputs.matrix).include[0] != null }}
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          dockerfile_path="${{ matrix.context }}/Dockerfile"
          version_arg_name="$(
            awk -F': ' '/^# image-version: / { print $2; exit }' "${dockerfile_path}"
          )"

          if [[ -z "${version_arg_name}" ]]; then
            version_arg_name="$(
              awk -F'[ =]' '/^ARG [A-Z0-9_]+_VERSION=/{print $2; exit}' "${dockerfile_path}"
            )"
          fi

          if [[ -z "${version_arg_name}" ]]; then
            echo "version=" >> "${GITHUB_OUTPUT}"
            echo "version_major_prefixed=" >> "${GITHUB_OUTPUT}"
            echo "version_major=" >> "${GITHUB_OUTPUT}"
            echo "version_minor_prefixed=" >> "${GITHUB_OUTPUT}"
            echo "version_minor=" >> "${GITHUB_OUTPUT}"
            echo "version_plain=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          version="$(
            awk -F= -v key="${version_arg_name}" '$1 == "ARG " key { print $2; exit }' "${dockerfile_path}"
          )"
          version_plain="${version#v}"
          version_major_prefixed="v$(printf '%s\n' "${version_plain}" | cut -d. -f1)"
          version_major="$(printf '%s\n' "${version_plain}" | cut -d. -f1)"
          version_minor_prefixed="v$(printf '%s\n' "${version_plain}" | cut -d. -f1,2)"
          version_minor="$(printf '%s\n' "${version_plain}" | cut -d. -f1,2)"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_major_prefixed=${version_major_prefixed}" >> "${GITHUB_OUTPUT}"
          echo "version_major=${version_major}" >> "${GITHUB_OUTPUT}"
          echo "version_minor_prefixed=${version_minor_prefixed}" >> "${GITHUB_OUTPUT}"
          echo "version_minor=${version_minor}" >> "${GITHUB_OUTPUT}"
          echo "version_plain=${version_plain}" >> "${GITHUB_OUTPUT}"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.version != '' }}
            type=raw,value=${{ steps.version.outputs.version_minor_prefixed }},enable=${{ steps.version.outputs.version_minor_prefixed != '' && steps.version.outputs.version_minor_prefixed != steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_major_prefixed }},enable=${{ steps.version.outputs.version_major_prefixed != '' && steps.version.outputs.version_major_prefixed != steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_plain }},enable=${{ steps.version.outputs.version_plain != '' && steps.version.outputs.version_plain != steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_minor }},enable=${{ steps.version.outputs.version_minor != '' }}
            type=raw,value=${{ steps.version.outputs.version_major }},enable=${{ steps.version.outputs.version_major != '' }}
            type=ref,event=tag,enable=${{ github.event_name == 'release' }}
            type=sha
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
