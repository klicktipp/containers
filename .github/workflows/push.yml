name: Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - ".github/workflows/push.yml"
      - ".github/workflows/release.yml"
      - "images/**"
      - "README.md"
  workflow_dispatch:

jobs:
  detect-images:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed images
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
            else
              mapfile -t image_dirs < <(
                git diff --name-only "${before}" "${after}" \
                  | awk -F/ '/^images\/[^/]+\// { print $2 }' \
                  | sort -u
              )
            fi
          fi

          if (( ${#image_dirs[@]} == 0 )); then
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          matrix_json="$(
            printf '%s\n' "${image_dirs[@]}" \
              | jq -R '{name: ., context: ("./images/" + .)}' \
              | jq -cs '{include: .}'
          )"

          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  push:
    runs-on: ubuntu-latest
    needs: detect-images
    if: ${{ fromJson(needs.detect-images.outputs.matrix).include[0] != null }}
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image version
        id: image_meta
        shell: bash
        run: |
          set -euo pipefail

          dockerfile_path="${{ matrix.context }}/Dockerfile"
          description="$(
            awk -F': ' '/^# image-description: / { print $2; exit }' "${dockerfile_path}"
          )"
          version_arg_name="$(
            awk -F': ' '/^# image-version: / { print $2; exit }' "${dockerfile_path}"
          )"

          echo "description=${description}" >> "${GITHUB_OUTPUT}"

          if [[ -z "${version_arg_name}" ]]; then
            version_arg_name="$(
              awk -F'[ =]' '/^ARG [A-Z0-9_]+_VERSION=/{print $2; exit}' "${dockerfile_path}"
            )"
          fi

          if [[ -z "${version_arg_name}" ]]; then
            echo "version=" >> "${GITHUB_OUTPUT}"
            echo "version_major_prefixed=" >> "${GITHUB_OUTPUT}"
            echo "version_major=" >> "${GITHUB_OUTPUT}"
            echo "version_minor_prefixed=" >> "${GITHUB_OUTPUT}"
            echo "version_minor=" >> "${GITHUB_OUTPUT}"
            echo "version_plain=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          version="$(
            awk -F= -v key="${version_arg_name}" '$1 == "ARG " key { print $2; exit }' "${dockerfile_path}"
          )"
          version_plain="${version#v}"
          version_major_prefixed="v$(printf '%s\n' "${version_plain}" | cut -d. -f1)"
          version_major="$(printf '%s\n' "${version_plain}" | cut -d. -f1)"
          version_minor_prefixed="v$(printf '%s\n' "${version_plain}" | cut -d. -f1,2)"
          version_minor="$(printf '%s\n' "${version_plain}" | cut -d. -f1,2)"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_major_prefixed=${version_major_prefixed}" >> "${GITHUB_OUTPUT}"
          echo "version_major=${version_major}" >> "${GITHUB_OUTPUT}"
          echo "version_minor_prefixed=${version_minor_prefixed}" >> "${GITHUB_OUTPUT}"
          echo "version_minor=${version_minor}" >> "${GITHUB_OUTPUT}"
          echo "version_plain=${version_plain}" >> "${GITHUB_OUTPUT}"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}
          labels: |
            org.opencontainers.image.description=${{ steps.image_meta.outputs.description }}
          annotations: |
            org.opencontainers.image.description=${{ steps.image_meta.outputs.description }}
          tags: |
            type=raw,value=${{ steps.image_meta.outputs.version }},enable=${{ steps.image_meta.outputs.version != '' }}
            type=raw,value=${{ steps.image_meta.outputs.version_minor_prefixed }},enable=${{ steps.image_meta.outputs.version_minor_prefixed != '' && steps.image_meta.outputs.version_minor_prefixed != steps.image_meta.outputs.version }}
            type=raw,value=${{ steps.image_meta.outputs.version_major_prefixed }},enable=${{ steps.image_meta.outputs.version_major_prefixed != '' && steps.image_meta.outputs.version_major_prefixed != steps.image_meta.outputs.version }}
            type=raw,value=${{ steps.image_meta.outputs.version_plain }},enable=${{ steps.image_meta.outputs.version_plain != '' && steps.image_meta.outputs.version_plain != steps.image_meta.outputs.version }}
            type=raw,value=${{ steps.image_meta.outputs.version_minor }},enable=${{ steps.image_meta.outputs.version_minor != '' }}
            type=raw,value=${{ steps.image_meta.outputs.version_major }},enable=${{ steps.image_meta.outputs.version_major != '' }}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch }}

      - name: Push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
