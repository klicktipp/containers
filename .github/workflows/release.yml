name: Release Docker Images

on:
  workflow_run:
    workflows:
      - Push Docker Images
    types:
      - completed

jobs:
  detect-images:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == github.event.repository.default_branch }}
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Collect changed images for release
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"

          if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
            diff_range="${head_sha}^..${head_sha}"
            mapfile -t image_dirs < <(
              git diff --name-only "${diff_range}" \
                | awk -F/ '/^images\/[^/]+\// { print $2 }' \
                | sort -u
            )
          else
            mapfile -t image_dirs < <(find images -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          fi

          if (( ${#image_dirs[@]} == 0 )); then
            echo 'matrix={"include":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          matrix_json="$(
            for image_name in "${image_dirs[@]}"; do
              dockerfile_path="images/${image_name}/Dockerfile"

              arg_value() {
                local key="$1"
                awk -F= -v key="${key}" '$1 == "ARG " key { print $2; exit }' "${dockerfile_path}"
              }

              version_arg_name="$(
                awk -F': ' '/^# image-version: / { print $2; exit }' "${dockerfile_path}"
              )"

              if [[ -z "${version_arg_name}" ]]; then
                version_arg_name="$(
                  awk -F'[ =]' '/^ARG [A-Z0-9_]+_VERSION=/{print $2; exit}' "${dockerfile_path}"
                )"
              fi

              version="$(arg_value "${version_arg_name}")"
              version_plain="${version#v}"

              jq -cn \
                --arg name "${image_name}" \
                --arg version "${version}" \
                --arg version_plain "${version_plain}" \
                --arg release_tag "${image_name}-${version}" \
                --arg release_name "${image_name} ${version}" \
                '{name: $name, version: $version, version_plain: $version_plain, release_tag: $release_tag, release_name: $release_name}'
            done | jq -cs '{include: .}'
          )"

          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  release:
    runs-on: ubuntu-latest
    needs: detect-images
    if: ${{ fromJson(needs.detect-images.outputs.matrix).include[0] != null }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate release notes for ${{ matrix.name }}
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          image_name="${{ matrix.name }}"
          current_tag="${{ matrix.release_tag }}"
          previous_tag="$(
            git tag --list "${image_name}-*" --sort=-creatordate \
              | grep -Fxv "${current_tag}" \
              | head -n1 || true
          )"
          body_file="$(mktemp)"

          {
            echo "Release for \`${image_name}\` version \`${{ matrix.version }}\`."
            echo
            echo "## Changes"
            echo

            if [[ -n "${previous_tag}" ]]; then
              commits="$(
                git log --reverse --format='- %s (%h)' "${previous_tag}..${head_sha}" -- "images/${image_name}" || true
              )"
            else
              commits="$(
                git log --reverse --format='- %s (%h)' "${head_sha}" -- "images/${image_name}" || true
              )"
            fi

            if [[ -n "${commits}" ]]; then
              printf '%s\n' "${commits}"
            else
              echo "No image-specific changes found."
            fi
          } > "${body_file}"

          echo "body_path=${body_file}" >> "${GITHUB_OUTPUT}"

      - name: Create or update release for ${{ matrix.name }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = '${{ matrix.release_tag }}';
            const name = '${{ matrix.release_name }}';
            const target = '${{ github.event.workflow_run.head_sha }}';
            const body = fs.readFileSync('${{ steps.notes.outputs.body_path }}', 'utf8');

            let existing = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              existing = response.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: false,
              });
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: target,
                name,
                body,
                draft: false,
                prerelease: false,
              });
            }
